---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: temporaltruautoscalers.temporal.bitovi.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
spec:
  group: temporal.bitovi.com
  names:
    kind: TemporalTRUAutoscaler
    listKind: TemporalTRUAutoscalerList
    plural: temporaltruautoscalers
    singular: temporaltruautoscaler
    shortNames:
      - ttautoscaler
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Namespace
          type: string
          jsonPath: .spec.temporalNamespace
        - name: MinTRU
          type: integer
          jsonPath: .spec.minTRU
        - name: MaxTRU
          type: integer
          jsonPath: .spec.maxTRU
        - name: CurrentTRU
          type: integer
          jsonPath: .status.currentTRU
        - name: LastScale
          type: string
          jsonPath: .status.lastScaleTime
        - name: Direction
          type: string
          jsonPath: .status.lastScaleDirection
      schema:
        openAPIV3Schema:
          description: >
            TemporalTRUAutoscaler watches APS utilization from the Temporal Cloud
            metrics endpoint and automatically scales TRU levels up or down by
            calling the Temporal Cloud API. One resource manages one Temporal Cloud
            namespace.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: TemporalTRUAutoscalerSpec defines the desired autoscaling policy.
              type: object
              required:
                - temporalNamespace
                - credentialsSecretRef
                - minTRU
                - maxTRU
              properties:
                temporalNamespace:
                  description: >
                    TemporalNamespace is the Temporal Cloud namespace to manage
                    (e.g. "my-namespace.a1b2c3").
                  type: string
                  minLength: 1
                credentialsSecretRef:
                  description: >
                    CredentialsSecretRef references the Kubernetes Secret that
                    contains the Temporal Cloud API key (key: "apiKey") and
                    optionally the account ID (key: "accountId").
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      description: Name of the Secret in the controller namespace.
                      type: string
                minTRU:
                  description: >
                    MinTRU is the minimum TRU level. The controller will never
                    scale below this value.
                  type: integer
                  minimum: 1
                maxTRU:
                  description: >
                    MaxTRU is the maximum TRU level. The controller will never
                    scale above this value.
                  type: integer
                  minimum: 1
                scaleUpThreshold:
                  description: >
                    ScaleUpThreshold is the APS utilization percentage (0-100) of
                    the current tier ceiling that triggers a scale-up action.
                    Defaults to 70.
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 70
                scaleDownThreshold:
                  description: >
                    ScaleDownThreshold is the APS utilization percentage (0-100)
                    below which scale-down is considered. The utilization must be
                    sustained below this threshold for the full scaleDownCooldown
                    window before a scale-down action is taken. Defaults to 70.
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 70
                scaleUpCooldown:
                  description: >
                    ScaleUpCooldown is the minimum duration between successive
                    scale-up actions. Defaults to 5 minutes. React quickly to
                    capacity pressure.
                  type: string
                  default: "5m"
                scaleDownCooldown:
                  description: >
                    ScaleDownCooldown is the minimum duration between successive
                    scale-down actions. Defaults to 1 hour because Temporal Cloud
                    bills for the full hour after a TRU change.
                  type: string
                  default: "1h"
            status:
              description: TemporalTRUAutoscalerStatus reflects the observed state.
              type: object
              properties:
                currentTRU:
                  description: CurrentTRU is the TRU level currently reported by Temporal Cloud.
                  type: integer
                lastScaleTime:
                  description: LastScaleTime is the timestamp of the most recent scale action.
                  type: string
                  format: date-time
                lastScaleDirection:
                  description: LastScaleDirection indicates whether the most recent scale action was Up or Down.
                  type: string
                  enum:
                    - Up
                    - Down
                conditions:
                  description: >
                    Conditions contains the current conditions of the autoscaler.
                    Known types: Ready, Scaling, AtMinimum, AtMaximum.
                  type: array
                  items:
                    description: Condition contains details for one aspect of the current state.
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$'
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
