# Default values for temporal-tru-autoscaler.

# replicaCount controls the number of controller replicas. More than 1 requires
# leaderElection to be enabled to prevent split-brain.
replicaCount: 1

image:
  repository: ghcr.io/bitovi/temporal-tru-autoscaler
  pullPolicy: IfNotPresent
  # tag defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # create determines whether a ServiceAccount is created by this chart.
  create: true
  # annotations to add to the ServiceAccount.
  annotations: {}
  # name of the ServiceAccount to use. If not set, a name is generated from the chart.
  name: ""

# podAnnotations are added to the controller pod.
podAnnotations: {}

# podLabels are added to the controller pod.
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# nodeSelector for the controller pod.
nodeSelector: {}

# tolerations for the controller pod.
tolerations: []

# affinity rules for the controller pod.
affinity: {}

# controller contains controller-specific configuration.
controller:
  # reconcileInterval is how often each TemporalTRUAutoscaler resource is polled.
  # Accepts Go duration strings: "30s", "1m", "2m30s".
  reconcileInterval: "30s"
  # leaderElection enables leader election (required when replicaCount > 1).
  leaderElection: false
  # metricsBindAddress is the address the Prometheus metrics endpoint binds to.
  metricsBindAddress: ":8080"
  # healthProbeBindAddress is the address the health/readiness probe binds to.
  healthProbeBindAddress: ":8081"

# metrics configures the controller's own Prometheus metrics exposure.
metrics:
  # enabled controls whether a Service is created for scraping controller metrics.
  enabled: true
  port: 8080
  serviceMonitor:
    # enabled controls whether a Prometheus ServiceMonitor is created.
    # Requires the prometheus-operator CRD to be installed.
    enabled: false
    interval: "30s"
    # additionalLabels are added to the ServiceMonitor for selector matching.
    additionalLabels: {}
