apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "temporal-tru-autoscaler.fullname" . }}
  labels:
    {{- include "temporal-tru-autoscaler.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - temporal.bitovi.com
    resources:
      - temporaltruautoscalers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - temporal.bitovi.com
    resources:
      - temporaltruautoscalers/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - temporal.bitovi.com
    resources:
      - temporaltruautoscalers/finalizers
    verbs:
      - update
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
